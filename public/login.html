<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Вхід · MockBank</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-brand">
      <span class="brand-dot"></span>
      <span>mock<span class="brand-slash">/</span>bank</span>
    </div>
    <div class="login-title">Увійти</div>
    <div class="login-sub">Введіть дані облікового запису</div>
    <div id="err" class="error error-hidden">Невірний логін або пароль.</div>
    <form method="POST" action="/login" autocomplete="off">
      <label>Логін</label>
      <input name="username" placeholder="vlad" required autofocus />
      <label>Пароль</label>
      <input name="password" type="password" placeholder="••••••••" required />
      <button type="submit">Увійти</button>
    </form>
    <div class="hint">
      <code>vlad / vlad123</code> &nbsp; <code>misha / misha123</code>
    </div>
  </div>
</div>
<script src="/login.js"></script>
</body>
</html>
